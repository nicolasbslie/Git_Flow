<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Barra de navegação */
        .navbar {
            background-color: #2e7d32;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .menu li {
            display: inline;
        }

        .menu a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #c8e6c9;
        }

        /* Conteúdo exemplo */
        .conteudo {
            padding: 30px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">EcoSpending</div>

        <ul class="menu">
            <li><a href="#">Início</a></li>
            <li><a href="#">Receitas</a></li>
            <li><a href="#">Gastos</a></li>
            <li><a href="#">Relatórios</a></li>
            <li><a href="#">Sair</a></li>
        </ul>
    </nav>

    <div class="conteudo">
        <h2>Bem-vindo ao sistema!</h2>
        <p>Conteúdo da página aqui...</p>
    </div>

</body>
</html>
